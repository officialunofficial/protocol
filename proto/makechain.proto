// --- Health ---

message GetHealthRequest {}

message GetHealthResponse {
  bool serving = 1;          // True if the gRPC server is accepting requests
  bool ready = 2;            // True if the node has loaded state and can serve queries
  uint64 current_block = 3;  // Latest committed block number (0 if not ready)
  uint64 uptime_secs = 4;    // Seconds since node started
  ReplayVerificationInfo replay_verification = 5;
}

// --- Dry Run ---

message DryRunMessageRequest {
  Message message = 1;
}

message DryRunMessageResponse {
  bool would_accept = 1;
  string error = 2;           // Non-empty if would_accept is false
  string error_stage = 3;     // "verification", "validation", "authorization", "state_transition"
}

// --- Commit Graph ---

message GetCommitAncestorsRequest {
  bytes project_id = 1;
  bytes commit_hash = 2;     // Start commit (walk backwards from here)
  uint32 limit = 3;          // Max commits to return (default 50)
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message GetCommitAncestorsResponse {
  repeated CommitMeta commits = 1;
}

// --- QMDB Proof-Verified Sync ---

message GetSyncTargetRequest {}

message GetSyncTargetResponse {
  bytes root = 1;              // 32-byte QMDB ops MMR root digest (Blake3)
  uint64 range_start = 2;     // Operation location range start (inclusive)
  uint64 range_end = 3;       // Operation location range end (exclusive)
  uint64 block_number = 4;    // Block number at this sync point
  bytes canonical_root = 5;   // 32-byte canonical state root (consensus-authenticated)
  Block block = 6;            // Certified committed tip block
  ExecutionPayload execution_payload = 7;
}

message SyncFetchRequest {
  uint64 op_count = 1;        // Total operation count at target (from GetSyncTarget.range_end)
  uint64 start_location = 2;  // Start location to fetch from
  uint64 max_operations = 3;  // Max operations per batch
  bool include_pinned_nodes = 4;
}

message SyncFetchResponse {
  bytes proof = 1;             // Encoded MMR Proof<Blake3Digest> (commonware-codec)
  repeated bytes operations = 2; // Each operation encoded via commonware-codec
  repeated bytes pinned_nodes = 3; // Blake3 digests required to verify the lower boundary when requested
}

// --- Block Sync ---

message SyncBlocksRequest {
  uint64 start_height = 1;  // First block to stream (inclusive)
  uint64 end_height = 2;    // Last block to stream (inclusive, 0 = latest)
}

message SyncBlocksResponse {
  Block block = 1;               // The block header and metadata
  ExecutionPayload execution_payload = 2;
  uint64 block_number = 3;       // Block number (convenience, also in block.header)
  bool done = 4;                 // True on the final response
}

// --- Current-State Proofs ---

message GetOperationProofRequest {
  bytes key = 1;  // Raw supported public state key (e.g. commit_key output), not QMDB-padded
}

message GetOperationProofResponse {
  bytes proof = 1;       // Serialized operation proof wire format (see state/proof.rs)
  bytes root = 2;        // 32-byte canonical current QMDB root this proof was generated against
  bytes value = 3;       // The current value of the key
}

message GetExclusionProofRequest {
  bytes key = 1;  // Raw supported public state key (e.g. project-name or collaborator key), not QMDB-padded
}

message GetExclusionProofResponse {
  bytes proof = 1;       // Serialized exclusion proof wire format (see state/proof.rs)
  bytes root = 2;        // 32-byte canonical current QMDB root this proof was generated against
}

message VerifyOperationProofRequest {
  bytes proof = 1;  // Serialized operation proof wire format (from GetOperationProof)
  bytes key = 2;    // Raw state key (same format as GetOperationProofRequest.key)
}

message VerifyOperationProofResponse {
  bool valid = 1;        // Whether the proof verifies against the current committed root
  string error = 2;      // Human-readable error if invalid (empty if valid)
  bytes root = 3;        // The committed root used for verification
}

message VerifyExclusionProofRequest {
  bytes proof = 1;  // Serialized exclusion proof wire format (from GetExclusionProof)
  bytes key = 2;    // Raw state key (same format as GetExclusionProofRequest.key)
}

message VerifyExclusionProofResponse {
  bool valid = 1;        // Whether the proof verifies against the current committed root
  string error = 2;      // Human-readable error if invalid (empty if valid)
  bytes root = 3;        // The committed root used for verification
}

message VerifyOperationProofAtBlockRequest {
  bytes proof = 1;         // Serialized operation proof wire format (from GetOperationProof)
  bytes key = 2;           // Raw state key (same format as GetOperationProofRequest.key)
  uint64 block_number = 3; // Canonical finalized block number whose state root must match the proof root
}

message VerifyOperationProofAtBlockResponse {
  bool valid = 1;        // Whether the proof verifies against the requested finalized block's state root
  string error = 2;      // Human-readable error if invalid (empty if valid)
  bytes root = 3;        // Canonical finalized state root resolved for block_number
  uint64 block_number = 4;  // Requested finalized block number used for verification (0 if unavailable)
}

message VerifyExclusionProofAtBlockRequest {
  bytes proof = 1;         // Serialized exclusion proof wire format (from GetExclusionProof)
  bytes key = 2;           // Raw state key (same format as GetExclusionProofRequest.key)
  uint64 block_number = 3; // Canonical finalized block number whose state root must match the proof root
}

message VerifyExclusionProofAtBlockResponse {
  bool valid = 1;        // Whether the proof verifies against the requested finalized block's state root
  string error = 2;      // Human-readable error if invalid (empty if valid)
  bytes root = 3;        // Canonical finalized state root resolved for block_number
  uint64 block_number = 4;  // Requested finalized block number used for verification (0 if unavailable)
}

message GetStorageQuotaProofRequest {
  reserved 1;                    // was mid
  uint32 as_of_unix_time = 2;  // Evaluate quota against the current root at this explicit time. Future values are rejected.
  bytes owner_address = 3;     // 20 bytes
}

message StorageGrantProofEntry {
  bytes key = 1;    // Raw storage_grant_key(owner_address, expires_at, claim_id) in canonical V2 semantics
  bytes value = 2;  // JSON-encoded StorageGrantState value stored at key
  bytes proof = 3;  // Serialized operation proof wire format (see state/proof.rs)
}

message GetStorageQuotaProofResponse {
  reserved 1;                    // was mid
  uint32 as_of_unix_time = 2;
  bytes root = 3;                    // 32-byte canonical current QMDB root all returned proofs were generated against
  bytes lower_bound_key = 4;         // Raw key immediately before the active suffix: [storage_grant_prefix(owner_address) | as_of_unix_time+1] in canonical V2 semantics
  bytes lower_bound_proof = 5;       // Exclusion proof for lower_bound_key against root
  repeated StorageGrantProofEntry grants = 6;
  uint32 storage_units = 7;          // Sum of proven active grants with expires_at > as_of_unix_time
  uint32 max_projects = 8;
  uint32 max_links = 9;
  uint32 max_verifications = 10;
  uint32 max_reactions = 11;
  uint32 max_collaborators_per_project = 12;
  bytes owner_address = 13;          // 20 bytes
  bytes upper_bound_key = 14;
  bytes upper_bound_proof = 15;
  uint32 max_merge_requests_per_project = 16;
  uint32 max_merge_requests_per_requester = 17;
  bytes account_value = 18;          // Encoded AccountState for account(owner_address)
  bytes account_proof = 19;          // Operation proof authenticating account(owner_address) at root
  bytes username_proof = 20;         // Empty iff username is null or storage_units == 0; otherwise operation proof for [0x08 | username]
  uint32 usable_storage_units = 21;  // Username-gated usable quota derived from storage_units plus authenticated username state
}

message GetCompoundProofRequest {
  bytes key = 1;  // The active state key (e.g. collaborator or verification key)
}

message GetCompoundProofResponse {
  bytes active_proof = 1;           // Operation proof if active key exists, exclusion proof if absent
  bool active_key_exists = 2;       // True if active_proof is an operation proof
  bytes tombstone_proof = 3;        // Operation proof if tombstone exists, exclusion proof if absent
  bool tombstone_exists = 4;        // True if tombstone_proof is an operation proof
  bytes prune_marker_proof = 5;     // Operation proof if prune marker exists, exclusion proof if absent
  bool prune_marker_exists = 6;     // True if prune_marker_proof is an operation proof
  bytes root = 7;                   // Single QMDB root all proofs are against
  bytes value = 8;                  // Active entry value (empty if absent)
  bool active = 9;                  // True if the 2P set member is active at root
  uint32 added_at = 10;             // Parsed active-entry timestamp field, 0 if absent
  uint32 removal_ts = 11;           // max(tombstone_at, prune_marker_at), 0 if neither exists
}

message VerifyStorageQuotaProofRequest {
  GetStorageQuotaProofResponse quota_proof = 1;
}

message VerifyStorageQuotaProofResponse {
  bool valid = 1;        // Whether the quota proof bundle verifies against the current committed root
  string error = 2;      // Human-readable error if invalid (empty if valid)
  bytes root = 3;        // The committed root used for verification
}
