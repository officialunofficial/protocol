}

message GetBlockResponse {
  Block block = 1;
  ExecutionPayload execution_payload = 2;
}

message ListBlocksRequest {
  uint64 start = 1;          // Starting block number (0 = latest)
  uint32 limit = 2;          // Max blocks to return
}

message ListBlocksResponse {
  repeated GetBlockResponse blocks = 1;
  uint64 latest_block = 2;   // Current chain height
}

// --- Messages ---

message GetMessageRequest {
  bytes hash = 1;             // 32-byte BLAKE3 hash of the message
}

message GetMessageResponse {
  Message message = 1;        // The full message
  uint64 block_number = 2;    // Block that included this message
}

// --- List Messages ---

message ListMessagesRequest {
  uint64 start_block = 1;          // Starting block number (inclusive, 0 = latest)
  uint64 end_block = 2;            // Ending block number (inclusive, 0 = start_block)
  uint32 limit = 3;                // Max messages to return
  repeated MessageType types = 4;  // Filter by message type (empty = all)
}

message MessageEntry {
  Message message = 1;
  uint64 block_number = 2;
}

message ListMessagesResponse {
  repeated MessageEntry messages = 1;
  uint64 start_block = 2;         // Actual start block used
  uint64 end_block = 3;           // Actual end block used
}

// --- Snapshot Info ---

message GetSnapshotInfoRequest {}

message GetSnapshotInfoResponse {
  uint64 block_number = 1;          // Block height of the snapshot
  bytes state_root = 2;             // BLAKE3 state root
  uint32 entry_count = 3;           // Number of key-value entries
  uint64 estimated_size_bytes = 4;  // Estimated encoded snapshot size
}

// --- Node Status ---

message GetNodeStatusRequest {}

enum ReplayVerificationStatus {
  REPLAY_VERIFICATION_STATUS_UNSPECIFIED = 0;
  REPLAY_VERIFICATION_STATUS_VERIFIED = 1;
  REPLAY_VERIFICATION_STATUS_TRUSTED_SNAPSHOT = 2;
  REPLAY_VERIFICATION_STATUS_BLOCKED_WAITING_EXTERNAL_EVIDENCE = 3;
}

message ReplayVerificationInfo {
  ReplayVerificationStatus status = 1;
  string detail = 2;
  uint64 blocked_block_number = 3;
  bool waiting_on_external_evidence = 4;
}

message GetNodeStatusResponse {
  uint64 current_block = 1;       // Latest committed block number
  uint32 mempool_size = 2;        // Number of messages in the mempool
  uint32 pending_blocks = 3;      // Pending blocks awaiting commit
  Network network = 4;            // Network this node operates on
  string version = 5;             // Node software version
  uint64 uptime_secs = 6;         // Seconds since node started
  uint64 total_messages = 7;      // Cumulative messages committed (survives GC)
  uint32 state_entries = 8;       // Number of entries in the state store
  ReplayVerificationInfo replay_verification = 9;
}

// --- Chain Stats ---

message GetChainStatsRequest {}

message GetChainStatsResponse {
  uint64 block_height = 1;
  uint64 total_messages = 2;
  uint32 total_projects = 3;
  uint32 total_accounts = 4;
  uint32 total_refs = 5;
  uint32 total_commits = 6;
  uint32 total_collaborators = 7;
  uint32 total_keys = 8;
  uint32 total_verifications = 9;
  uint32 state_entries = 10;
  uint32 total_links = 11;
  uint32 total_reactions = 12;
}

// --- Verifications ---

message ListVerificationsRequest {
  reserved 1;               // was mid
  uint32 limit = 2;
  bytes cursor = 3;
  bytes owner_address = 4;   // 20-byte owner address
}

message VerificationEntry {
  VerificationType verification_type = 1;
  bytes address = 2;
  bytes chain_id = 3;
  uint32 claim_key_type = 4;
  bytes claim_block_hash = 5;
}

message ListVerificationsResponse {
  repeated VerificationEntry verifications = 1;
  bytes next_cursor = 2;
}

// --- Links ---

message ListLinksRequest {
  reserved 1;               // was mid
  LinkType link_type = 2;   // Filter by type (NONE = all)
  uint32 limit = 3;
  bytes cursor = 4;
  bytes owner_address = 5;  // 20-byte owner address
}

message LinkEntry {
  LinkType link_type = 1;
  reserved 2;                      // was target_mid
  bytes target_project_id = 3;     // Set for STAR links, 32 bytes
  uint32 added_at = 4;             // Consensus timestamp when the link was created
  bytes target_owner_address = 5;  // Set for FOLLOW links when known
  bytes source_owner_address = 6;  // Set when known
}

message ListLinksResponse {
  repeated LinkEntry links = 1;
  bytes next_cursor = 2;
}

message ListLinksByTargetRequest {
  LinkType link_type = 1;          // Required: FOLLOW or STAR
  reserved 2;                      // was target_mid
  oneof target {
    bytes target_project_id = 3;   // For STAR: which project is starred
  }
  uint32 limit = 4;
  bytes cursor = 5;
  bytes target_owner_address = 6;  // For FOLLOW: 20-byte target owner address
}

message ListLinksByTargetResponse {
  repeated LinkEntry links = 1;
  bytes next_cursor = 2;
}

// --- Reactions ---

message ListReactionsRequest {
  reserved 1;                        // was mid
  ReactionType reaction_type = 2;    // Filter by type (NONE = all)
  bytes target_project_id = 3;       // Filter by project (empty = all)
  uint32 limit = 4;
  bytes cursor = 5;
  bytes owner_address = 6;           // 20-byte owner address
}

message ReactionEntry {
  ReactionType reaction_type = 1;
  bytes target_project_id = 2;       // 32 bytes
  bytes target_commit_hash = 3;      // 32 bytes
  reserved 4;                        // was source_mid
  uint32 added_at = 5;               // Consensus timestamp
  bytes source_owner_address = 6;    // 20-byte owner address when known
}

message ListReactionsResponse {
  repeated ReactionEntry reactions = 1;
  bytes next_cursor = 2;
}

message ListReactionsByTargetRequest {
  ReactionType reaction_type = 1;    // Required: LIKE
  bytes target_project_id = 2;       // 32 bytes
  bytes target_commit_hash = 3;      // 32 bytes
  uint32 limit = 4;
  bytes cursor = 5;
}

message ListReactionsByTargetResponse {
  repeated ReactionEntry reactions = 1;
  bytes next_cursor = 2;
}

// --- Merge Requests ---

message GetMergeRequestRequest {
  bytes project_id = 1;  // 32 bytes
  bytes request_id = 2;  // 32 bytes
}

message GetMergeRequestResponse {
