}

// --- Account ---

message GetAccountRequest {
  reserved 1;               // was mid
  bytes owner_address = 2;  // 20-byte owner address
}

message GetAccountByKeyRequest {
  bytes key = 1;  // Ed25519 public key, 32 bytes
}

message GetAccountResponse {
  reserved 1;               // was mid
  string display_name = 2;
  string avatar = 3;
  string bio = 4;
  string website = 5;
  repeated KeyEntry keys = 6;
  uint32 storage_units = 7;  // Raw active storage grants; max_* fields reflect username-gated usable quota
  uint32 project_count = 8;
  repeated VerificationEntry verifications = 9;
  bytes owner_address = 10;  // 20-byte EVM wallet address (empty if not yet set)
  uint32 link_count = 11;    // Number of links (follows + stars) from this account
  uint32 reaction_count = 12; // Number of reactions (likes) from this account
  uint64 custody_nonce = 13; // Next expected signer nonce for custody-authorized signer changes
  uint32 max_projects = 14;
  uint32 max_links = 15;
  uint32 max_verifications = 16;
  uint32 max_reactions = 17;
  uint32 max_collaborators_per_project = 18;
  uint32 max_merge_requests_per_requester = 19;
  uint32 max_merge_requests_per_project = 20;
  string username = 21;       // Canonical active username (empty when no active username)
}

message KeyEntry {
  bytes key = 1;
  KeyScope scope = 2;
  repeated bytes allowed_projects = 3;
  reserved 4;                          // was request_mid
  reserved 5;                          // legacy key_type, not used in V2
  bytes request_owner_address = 6;     // 20-byte owner address of requesting app when known
}

message GetKeyRequest {
  reserved 1;               // was mid
  bytes key = 2;   // Ed25519 public key, 32 bytes
  bytes owner_address = 3;  // 20-byte owner address
}

message GetKeyResponse {
  bytes key = 1;
  KeyScope scope = 2;
  repeated bytes allowed_projects = 3;
  uint32 added_at = 4;
  reserved 5;                          // was request_mid
  reserved 6;                          // legacy key_type, not used in V2
  bytes request_owner_address = 7;     // 20-byte owner address of requesting app when known
}

message ListKeysRequest {
  reserved 1;               // was mid
  uint32 limit = 2;
  bytes cursor = 3;     // public key to start after (for pagination)
  bytes owner_address = 4;  // 20-byte owner address
}

message ListKeysResponse {
  repeated GetKeyResponse keys = 1;
  bytes next_cursor = 2;
}

message GetAccountActivityRequest {
  reserved 1;               // was mid
  uint32 limit = 2;          // Max messages (default 50)
  repeated MessageType types = 3;  // Filter by type (empty = all)
  bytes owner_address = 4;   // 20-byte owner address
}

message GetAccountActivityResponse {
  repeated MessageEntry messages = 1;
}

// --- Blocks ---

message GetBlockRequest {
