syntax = "proto3";

package makechain;

// ============================================================
// ENVELOPE
// ============================================================

message Message {
  MessageData data       = 1;
  bytes hash             = 2;  // BLAKE3(data), 32 bytes
  bytes signature        = 3;  // Ed25519 signature over hash, 64 bytes
  bytes signer           = 4;  // Ed25519 public key, 32 bytes
  optional bytes data_bytes = 5;  // Cached canonical encoding of MessageData (used by verify_message)
  reserved 6;  // legacy signer_key_type, not used in V2
}

message MessageData {
  MessageType type    = 1;
  reserved 2;              // was mid
  uint32 timestamp    = 3;  // Makechain epoch seconds
  Network network     = 4;
  bytes owner_address = 5;  // 20-byte owner address

  reserved 60;  // was key_add
  reserved 80;  // was ownership_transfer
  reserved 81;  // was storage_rent
  oneof body {
    ProjectCreateBody      project_create      = 10;
    ProjectMetadataBody    project_metadata    = 11;
    ProjectArchiveBody     project_archive     = 12;
    ForkBody               fork                = 13;
    ProjectRemoveBody      project_remove      = 14;

    RefUpdateBody          ref_update          = 20;
    RefDeleteBody          ref_delete          = 21;

    CommitBundleBody       commit_bundle       = 30;

    CollaboratorAddBody    collaborator_add    = 40;
    CollaboratorRemoveBody collaborator_remove = 41;
    AccountDataBody        account_data        = 50;

    VerificationAddBody    verification_add    = 70;
    VerificationRemoveBody verification_remove = 71;
    StorageClaimBody       storage_claim       = 72;
    UsernameCreateBody     username_create     = 73;
    UsernameUpdateBody     username_update     = 74;

    LinkAddBody            link_add            = 90;
    LinkRemoveBody         link_remove         = 91;
    ReactionAddBody        reaction_add        = 92;
    ReactionRemoveBody     reaction_remove     = 93;

    SignerAddBody          signer_add          = 94;
    SignerRemoveBody       signer_remove       = 95;

    MergeRequestAddBody    merge_request_add    = 96;
    MergeRequestRemoveBody merge_request_remove = 97;
  }
}

enum MessageType {
  MESSAGE_TYPE_NONE                = 0;

  MESSAGE_TYPE_PROJECT_CREATE      = 1;
  MESSAGE_TYPE_PROJECT_METADATA    = 2;
  MESSAGE_TYPE_PROJECT_ARCHIVE     = 3;
  MESSAGE_TYPE_FORK                = 4;
  MESSAGE_TYPE_PROJECT_REMOVE      = 5;

  MESSAGE_TYPE_REF_UPDATE          = 10;
  MESSAGE_TYPE_REF_DELETE          = 11;
  MESSAGE_TYPE_SIGNER_ADD          = 14;
  MESSAGE_TYPE_SIGNER_REMOVE       = 15;

  MESSAGE_TYPE_COMMIT_BUNDLE       = 20;

  MESSAGE_TYPE_COLLABORATOR_ADD    = 30;
  MESSAGE_TYPE_COLLABORATOR_REMOVE = 31;
  MESSAGE_TYPE_ACCOUNT_DATA        = 40;

  reserved 50;  // KEY_ADD

  MESSAGE_TYPE_VERIFICATION_ADD    = 60;
  MESSAGE_TYPE_VERIFICATION_REMOVE = 61;

  reserved 70;  // OWNERSHIP_TRANSFER
  reserved 71;  // STORAGE_RENT
  MESSAGE_TYPE_STORAGE_CLAIM       = 72;
  MESSAGE_TYPE_USERNAME_CREATE     = 73;
  MESSAGE_TYPE_USERNAME_UPDATE     = 74;

  reserved 16;  // RELAY_SIGNER_ADD
  reserved 17;  // RELAY_SIGNER_REMOVE

  MESSAGE_TYPE_LINK_ADD            = 80;
  MESSAGE_TYPE_LINK_REMOVE         = 81;
  MESSAGE_TYPE_REACTION_ADD        = 82;
  MESSAGE_TYPE_REACTION_REMOVE     = 83;
  MESSAGE_TYPE_MERGE_REQUEST_ADD   = 84;
  MESSAGE_TYPE_MERGE_REQUEST_REMOVE = 85;
}

enum Network {
  NETWORK_NONE    = 0;
  NETWORK_MAINNET = 1;
  NETWORK_TESTNET = 2;
  NETWORK_DEVNET  = 3;
}

// ============================================================
// 2P: PROJECT SET — Create/Remove
//
// project_id = BLAKE3 hash of the PROJECT_CREATE message (32 bytes).
// Content-addressed: two projects with the same name get different IDs
// because the hash includes owner_address, timestamp, etc.
// ============================================================

message ProjectCreateBody {
  string name          = 1;  // Alphanumeric + hyphens, 1-100 chars
  Visibility visibility = 2;
  string description   = 3;
  string license       = 4;  // SPDX identifier
  // project_id is not a field — it IS the Message.hash of this message
}

message ProjectRemoveBody {
  bytes project_id = 1;  // BLAKE3 hash of the PROJECT_CREATE message, 32 bytes
}

enum Visibility {
  VISIBILITY_PUBLIC  = 0;
  VISIBILITY_PRIVATE = 1;
}

// ============================================================
// 1P: SINGLETON
// ============================================================

message ForkBody {
  bytes source_project_id  = 1;  // 32 bytes
  string name              = 2;
  reserved 3;                    // Was state_proof
  bytes source_commit_hash = 4;  // Target hash: the commit being forked from, 32 bytes
  Visibility visibility    = 5;  // Visibility of forked project (default: PUBLIC)
  // forked project_id = Message.hash of this FORK message
}

// ============================================================
// 1P: LWW REGISTER — Metadata
// ============================================================

message ProjectMetadataBody {
  bytes project_id               = 1;  // 32 bytes
  ProjectMetadataType field      = 2;
  string value                   = 3;
}

enum ProjectMetadataType {
  PROJECT_METADATA_NONE        = 0;
  PROJECT_METADATA_NAME        = 1;
  PROJECT_METADATA_DESCRIPTION = 2;
  PROJECT_METADATA_LICENSE     = 3;
  PROJECT_METADATA_VISIBILITY  = 4;
}

message AccountDataBody {
  AccountDataType field = 1;
  string value          = 2;
}

enum AccountDataType {
  ACCOUNT_DATA_NONE     = 0;
  ACCOUNT_DATA_DISPLAY_NAME = 1;
  ACCOUNT_DATA_AVATAR   = 2;
  ACCOUNT_DATA_BIO      = 3;
  ACCOUNT_DATA_WEBSITE  = 4;
}

// ============================================================
// 1P: APPEND-ONLY — Commits
// ============================================================

message CommitBundleBody {
  bytes project_id           = 1;  // 32 bytes
  repeated CommitMeta commits = 2;  // Ordered parent-first
  bytes content_digest       = 3;  // Optional: integrity proof (e.g. Zoda commitment), 32 bytes
  string url                 = 4;  // Optional: content locator URL
}

message CommitMeta {
  bytes hash             = 1;  // BLAKE3 of full commit object, 32 bytes
  repeated bytes parents = 2;  // Parent commit hashes
  bytes tree_root        = 3;  // BLAKE3 of tree object
  reserved 4;                  // was author_mid
  uint32 author_timestamp = 5;
  string title           = 6;  // First line of commit message, max 200 chars
  bytes message_hash     = 7;  // BLAKE3 of full commit message
  bytes author_address   = 8;  // 20-byte owner address when known
}

// ============================================================
// 1P: STATE TRANSITION
// ============================================================

message ProjectArchiveBody {
  bytes project_id = 1;  // 32 bytes
}

// ============================================================
// 2P: REF SET — CAS-ordered add/remove
// ============================================================

message RefUpdateBody {
  bytes project_id = 1;   // 32 bytes
  bytes ref_name   = 2;   // UTF-8, e.g. "refs/heads/main"
  RefType ref_type = 3;
  bytes old_hash   = 4;   // CAS: expected current value (empty = new ref)
  bytes new_hash   = 5;   // New commit hash, BLAKE3, 32 bytes
  bool force       = 6;   // Skip fast-forward check
  uint64 nonce     = 7;   // Replay protection per (owner_address, project, ref)
}

enum RefType {
  REF_TYPE_BRANCH = 0;
  REF_TYPE_TAG    = 1;
}

message RefDeleteBody {
  bytes project_id    = 1;  // 32 bytes
  bytes ref_name      = 2;
  bytes expected_hash = 3;  // CAS
  uint64 nonce        = 4;
}

// ============================================================
// 2P: COLLABORATOR SET — Add/Remove
// ============================================================

message CollaboratorAddBody {
  bytes project_id         = 1;  // 32 bytes
  reserved 2;                    // was target_mid
  Permission permission    = 3;
  bytes target_owner_address = 4; // 20-byte owner address
}

message CollaboratorRemoveBody {
  bytes project_id         = 1;  // 32 bytes
  reserved 2;                    // was target_mid
  bytes target_owner_address = 3; // 20-byte owner address
}

enum Permission {
  PERMISSION_READ  = 0;
  PERMISSION_WRITE = 1;
  PERMISSION_ADMIN = 2;
  PERMISSION_OWNER = 3;
}

// ============================================================
// KEY SCOPES
// ============================================================

enum KeyScope {
  KEY_SCOPE_OWNER   = 0;
  KEY_SCOPE_SIGNING = 1;
  KEY_SCOPE_AGENT   = 2;
}

message StorageClaimBody {
  uint32 units = 1;                 // Units granted by this settlement claim
  bytes settlement_tx_hash = 2;     // 32-byte settlement transaction hash
  uint64 settlement_chain_id = 3;   // Host-chain EIP-155 chain id
  uint32 settlement_log_index = 4;  // Receipt-local log index
  bytes actor = 5;                  // 20-byte EVM address that paid or credited the settlement
}

message UsernameCreateBody {
  string username = 1;              // Canonical lowercase username for first registration
}

message UsernameUpdateBody {
  string username = 1;              // Canonical lowercase replacement username
}

// ============================================================
// 2P: VERIFICATION SET — Add/Remove (external identity proofs)
// ============================================================

message VerificationAddBody {
  VerificationType verification_type = 1;
  bytes address                      = 2;  // External address/identifier (e.g. 20-byte Ethereum address)
  bytes claim_signature              = 3;  // Signature from the external key proving ownership
  bytes chain_id                     = 4;  // Chain identifier (e.g. 1 = Ethereum mainnet, 10 = Optimism)
  uint32 claim_key_type              = 5;
  bytes claim_block_hash             = 6;
}

message VerificationRemoveBody {
  bytes address = 1;  // Same address as the VerificationAdd being removed
}

enum VerificationType {
  VERIFICATION_TYPE_NONE          = 0;
  VERIFICATION_TYPE_ETH_ADDRESS   = 1;  // Ethereum EOA
  VERIFICATION_TYPE_SOL_ADDRESS   = 2;  // Solana address
}

// ============================================================
// 2P: LINK SET — Social graph relationships (follow, star)
// ============================================================

message LinkAddBody {
  LinkType link_type          = 1;
  reserved 2;                    // was target_mid
  oneof target {
    bytes target_project_id   = 3;  // For STAR (account → project), 32 bytes
    bytes target_owner_address = 4; // For FOLLOW (account → account), 20-byte owner address
  }
}

message LinkRemoveBody {
  LinkType link_type          = 1;
  reserved 2;                    // was target_mid
  oneof target {
    bytes target_project_id   = 3;
    bytes target_owner_address = 4;
  }
}

enum LinkType {
  LINK_TYPE_NONE   = 0;
  LINK_TYPE_FOLLOW = 1;  // Account follows another account
  LINK_TYPE_STAR   = 2;  // Account stars a project
}

// ============================================================
// 2P: REACTION SET — Commit reactions (likes)
// ============================================================

message ReactionAddBody {
  ReactionType reaction_type     = 1;
  bytes target_project_id        = 2;  // 32 bytes
  bytes target_commit_hash       = 3;  // 32 bytes
}

message ReactionRemoveBody {
  ReactionType reaction_type     = 1;
  bytes target_project_id        = 2;  // 32 bytes
  bytes target_commit_hash       = 3;  // 32 bytes
}

enum ReactionType {
  REACTION_TYPE_NONE = 0;
  REACTION_TYPE_LIKE = 1;
}

// ============================================================
// 2P: MERGE REQUEST SET — Cross-project contribution proposals
// ============================================================

message MergeRequestAddBody {
  bytes project_id         = 1;  // target project_id, 32 bytes
  bytes source_project_id  = 2;  // source fork-descendant project_id, 32 bytes
  bytes source_ref         = 3;  // 1-254 bytes, no 0x00
  bytes source_commit_hash = 4;  // 32 bytes
  bytes target_ref         = 5;  // 1-254 bytes, no 0x00
  string title             = 6;  // 1-200 UTF-8 bytes
}

message MergeRequestRemoveBody {
  bytes project_id = 1;  // target project_id, 32 bytes
  bytes request_id = 2;  // original MERGE_REQUEST_ADD Message.hash, 32 bytes
}

// ============================================================
// 2P: SIGNER SET — Self-authenticating key operations
//
// These are submitted directly by clients.
// Authorization comes from an EIP-712 custody_signature signed by the
// account's owner_address, not from the message envelope signer.
// ============================================================

message SignerAddBody {
  bytes key = 1;                        // Ed25519 public key, 32 bytes
  uint32 scope = 2;                     // KeyScope: 0 = Owner, 1 = Signing, 2 = Agent
  bytes custody_signature = 3;          // EIP-712 signature: 65 bytes (type 0/1) or WebAuthn envelope (type 2)
  reserved 4;                           // Was deadline
  repeated bytes allowed_projects = 5;  // Agent scope: project IDs (32 bytes each)
  uint32 custody_key_type = 6;          // 0 = secp256k1, 1 = P256, 2 = WebAuthn P256, 3 = ERC1271
  uint64 nonce = 7;                     // Must match account custody_nonce (replay protection)
  reserved 8;                           // was request_mid
  bytes request_signature = 9;         // EIP-712 SignerRequest sig from app's owner_address: 65 bytes (type 0/1) or WebAuthn envelope (type 2)
  uint32 request_key_type = 10;        // 0 = secp256k1, 1 = P256, 2 = WebAuthn P256, 3 = ERC1271
  uint64 valid_after = 11;             // Earliest unix timestamp accepted for this authorization
  uint64 valid_before = 12;            // Latest unix timestamp accepted for this authorization
  reserved 13;                         // legacy key_type, not used in V2
  bytes request_owner_address = 14;    // 20-byte owner address of requesting app when known
  bytes custody_block_hash = 15;       // Required iff custody_key_type == 3, exactly 32 bytes
  bytes request_block_hash = 16;       // Required iff request_key_type == 3, exactly 32 bytes
}

message SignerRemoveBody {
  bytes key = 1;                        // Ed25519 public key to remove, 32 bytes
  bytes custody_signature = 2;          // EIP-712 signature: 65 bytes (type 0/1) or WebAuthn envelope (type 2)
  uint32 custody_key_type = 4;          // 0 = secp256k1, 1 = P256, 2 = WebAuthn P256, 3 = ERC1271
  reserved 3;                           // Was deadline
  uint64 nonce = 5;                     // Must match account custody_nonce (replay protection)
  uint64 valid_after = 6;               // Earliest unix timestamp accepted for this authorization
  uint64 valid_before = 7;              // Latest unix timestamp accepted for this authorization
  bytes custody_block_hash = 8;         // Required iff custody_key_type == 3, exactly 32 bytes
}

// ============================================================
// EXECUTION PAYLOAD GROUPING
// ============================================================

message ProjectMessages {
  bytes project_id = 1;           // 32 bytes
  repeated Message messages = 2;
}

message ExecutionPayload {
  bytes digest = 1;                          // BLAKE3 state root, 32 bytes
  repeated Message account_messages = 2;
  repeated ProjectMessages project_messages = 3;
  uint64 timestamp = 4;                      // proposer's wall-clock timestamp (unix secs)
  uint64 block_number = 5;                   // target block height for this proposal
  bytes parent_hash = 6;                     // 32 bytes previous block hash
  uint32 chain_id = 7;                       // proto::Network enum value
  uint32 version = 8;                        // execution payload version
  ResharePayload reshare = 9;                // Optional DKG/reshare data committed with the block
}

message SubblockPayload {
  bytes validator_key = 1;              // 32 bytes Ed25519 public key
  bytes parent_hash = 2;               // 32 bytes chain tip (staleness check)
  bytes signature = 3;                  // 64 bytes Ed25519 over BLAKE3(content)
  repeated Message account_messages = 4;
  repeated ProjectMessages project_messages = 5;
  uint64 timestamp = 6;
}

// ============================================================
// BLOCKS AND SHARDS
// ============================================================

message Height {
  uint32 shard_index  = 1;
  uint64 block_number = 2;
}

message ShardChunk {
  ShardHeader header                  = 1;
  bytes hash                          = 2;
  repeated ProjectTransaction txns    = 3;
  Commits commits                     = 4;
}

message ShardHeader {
  Height height      = 1;
  uint64 timestamp   = 2;
  bytes parent_hash  = 3;
  bytes shard_root   = 4;
}

message ProjectTransaction {
  bytes project_id                 = 1;  // 32 bytes
  repeated Message user_messages   = 2;
  bytes project_root               = 3;  // Merkle root after applying
}

message Block {
  BlockHeader header             = 1;
  bytes hash                     = 2;
  ShardWitness witness           = 3;
  Commits commits                = 4;
  repeated ShardChunk chunks     = 5;  // Transaction data (single chunk in single-chain mode)
  bytes consensus_finalization   = 6;  // commonware-codec Finalization<ed25519, Blake3Digest>
  ResharePayload reshare         = 7;  // Optional DKG/reshare data committed with the block
}

message ResharePayload {
  repeated ReshareOutcome outcomes = 1;
}

message ReshareOutcome {
  uint64 epoch = 1;
  ReshareOutcomeType type = 2;
  bytes dealer = 3;                 // Ed25519 public key when applicable, 32 bytes
  bytes payload = 4;                // Opaque Commonware DKG/reshare bytes for this phase
}

enum ReshareOutcomeType {
  RESHARE_OUTCOME_TYPE_NONE = 0;
  RESHARE_OUTCOME_TYPE_COMMITMENT = 1;
  RESHARE_OUTCOME_TYPE_ACK = 2;
  RESHARE_OUTCOME_TYPE_REVEAL = 3;
  RESHARE_OUTCOME_TYPE_FINAL_OUTPUT = 4;
}

message BlockHeader {
  Height height            = 1;
  uint64 timestamp         = 2;
  uint32 version           = 3;
  Network chain_id         = 4;
  bytes parent_hash        = 5;
  bytes state_root         = 6;
}

message ShardWitness {
  repeated ShardChunkRef shard_refs = 1;
}

message ShardChunkRef {
  Height height      = 1;
  bytes shard_root   = 2;
  bytes shard_hash   = 3;
}

// ============================================================
// CONSENSUS
// ============================================================

message Vote {
  Height height  = 1;
  bytes value    = 2;  // Hash of proposed block/chunk
  bytes voter    = 3;  // Ed25519 public key
}

message CommitSignature {
  bytes signer    = 1;
  bytes signature = 2;
}

message Commits {
  Height height                     = 1;
  bytes value                       = 2;
  repeated CommitSignature signatures = 3;
}

// ============================================================
// API SERVICE
// ============================================================

service MakechainService {
  // Write path
  rpc SubmitMessage(SubmitMessageRequest) returns (SubmitMessageResponse);
  rpc BatchSubmitMessages(BatchSubmitRequest) returns (BatchSubmitResponse);

  // Read path — projects
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc GetProjectByName(GetProjectByNameRequest) returns (GetProjectResponse);
  rpc SearchProjects(SearchProjectsRequest) returns (ListProjectsResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProjectActivity(GetProjectActivityRequest) returns (GetProjectActivityResponse);

  // Read path — refs
  rpc GetRef(GetRefRequest) returns (GetRefResponse);
  rpc ListRefs(ListRefsRequest) returns (ListRefsResponse);

  // Read path — commits
  rpc GetCommit(GetCommitRequest) returns (GetCommitResponse);
  rpc ListCommits(ListCommitsRequest) returns (ListCommitsResponse);

  // Read path — collaborators
  rpc ListCollaborators(ListCollaboratorsRequest) returns (ListCollaboratorsResponse);

  // Read path — account
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc GetAccountByKey(GetAccountByKeyRequest) returns (GetAccountResponse);
  rpc GetAccountActivity(GetAccountActivityRequest) returns (GetAccountActivityResponse);

  // Read path — keys
  rpc GetKey(GetKeyRequest) returns (GetKeyResponse);
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);

  // Read path — verifications
  rpc ListVerifications(ListVerificationsRequest) returns (ListVerificationsResponse);

  // Read path — links
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc ListLinksByTarget(ListLinksByTargetRequest) returns (ListLinksByTargetResponse);

  // Read path — reactions
  rpc ListReactions(ListReactionsRequest) returns (ListReactionsResponse);
  rpc ListReactionsByTarget(ListReactionsByTargetRequest) returns (ListReactionsByTargetResponse);

  // Read path — merge requests
  rpc GetMergeRequest(GetMergeRequestRequest) returns (GetMergeRequestResponse);
  rpc ListMergeRequests(ListMergeRequestsRequest) returns (ListMergeRequestsResponse);
  rpc ListMergeRequestsByRequester(ListMergeRequestsByRequesterRequest) returns (ListMergeRequestsByRequesterResponse);

  // Read path — blocks
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse);
  rpc ListBlocks(ListBlocksRequest) returns (ListBlocksResponse);

  // Read path — messages
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);

  // Node status
  rpc GetNodeStatus(GetNodeStatusRequest) returns (GetNodeStatusResponse);
  rpc GetChainStats(GetChainStatsRequest) returns (GetChainStatsResponse);

  // Snapshots
  rpc GetSnapshotInfo(GetSnapshotInfoRequest) returns (GetSnapshotInfoResponse);

  // Validation
  rpc DryRunMessage(DryRunMessageRequest) returns (DryRunMessageResponse);

  // Commit graph
  rpc GetCommitAncestors(GetCommitAncestorsRequest) returns (GetCommitAncestorsResponse);

  // Ref history
  rpc GetRefLog(GetRefLogRequest) returns (GetRefLogResponse);

  // Admin
  rpc GetMempoolInfo(GetMempoolInfoRequest) returns (GetMempoolInfoResponse);

  // Health
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);

  // Streaming
  rpc SubscribeMessages(SubscribeRequest) returns (stream Message);
  rpc SubscribeBlocks(SubscribeBlocksRequest) returns (stream GetBlockResponse);

  // Sync — QMDB proof-verified state sync
  rpc GetSyncTarget(GetSyncTargetRequest) returns (GetSyncTargetResponse);
  rpc SyncFetch(SyncFetchRequest) returns (SyncFetchResponse);

  // Sync — block-by-block catch-up from a peer
  rpc SyncBlocks(SyncBlocksRequest) returns (stream SyncBlocksResponse);

  // Proofs — QMDB current-state proofs
  rpc GetOperationProof(GetOperationProofRequest) returns (GetOperationProofResponse);
  rpc GetExclusionProof(GetExclusionProofRequest) returns (GetExclusionProofResponse);
  rpc VerifyOperationProof(VerifyOperationProofRequest) returns (VerifyOperationProofResponse);
  rpc VerifyExclusionProof(VerifyExclusionProofRequest) returns (VerifyExclusionProofResponse);
  rpc VerifyOperationProofAtBlock(VerifyOperationProofAtBlockRequest) returns (VerifyOperationProofAtBlockResponse);
  rpc VerifyExclusionProofAtBlock(VerifyExclusionProofAtBlockRequest) returns (VerifyExclusionProofAtBlockResponse);
  rpc GetStorageQuotaProof(GetStorageQuotaProofRequest) returns (GetStorageQuotaProofResponse);
  rpc GetCompoundProof(GetCompoundProofRequest) returns (GetCompoundProofResponse);
  rpc VerifyStorageQuotaProof(VerifyStorageQuotaProofRequest) returns (VerifyStorageQuotaProofResponse);
}

// --- Write ---

message SubmitMessageRequest {
  Message message = 1;
}

message SubmitMessageResponse {
  bytes hash = 1;       // BLAKE3 hash of accepted message
  bool accepted = 2;
  string error = 3;     // Non-empty if !accepted
}

message BatchSubmitRequest {
  repeated Message messages = 1;  // Up to 100 messages
}

message BatchSubmitResult {
  bytes hash = 1;
  bool accepted = 2;
  string error = 3;
}

message BatchSubmitResponse {
  repeated BatchSubmitResult results = 1;
  uint32 accepted_count = 2;
  uint32 rejected_count = 3;
}

// --- Projects ---

message GetProjectRequest {
  bytes project_id = 1;  // 32 bytes
  uint64 caller_mid = 2 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message GetProjectResponse {
  bytes project_id = 1;
  string name = 2;
  string description = 3;
  string license = 4;
  Visibility visibility = 5;
  reserved 6;             // was owner_mid
  string status = 7;     // "active", "archived", "removed"
  bytes fork_source = 8; // Source project_id if forked, empty otherwise
  uint32 ref_count = 9;
  uint32 collaborator_count = 10;
  uint32 commit_count = 11;
  uint32 max_refs = 12;           // Per-project ref limit (spec §10)
  uint32 max_collaborators = 13;  // Per-project collaborator limit
  uint32 max_commits = 14;        // Per-project commit limit (before pruning)
  bytes owner_address = 15;       // 20-byte owner address when known
  uint32 merge_request_count = 16;
}

message GetProjectByNameRequest {
  reserved 1;               // was owner_mid
  string name = 2;          // Project name
  uint64 caller_mid = 3 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
  bytes owner_address = 4;  // 20-byte owner address
}

message SearchProjectsRequest {
  string query = 1;         // Name prefix search
  reserved 2;               // was owner_mid
  uint32 limit = 3;         // Max results (default 50)
  bytes cursor = 4;         // Opaque pagination cursor from previous response
  uint64 caller_mid = 5 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
  bytes owner_address = 6;  // 20-byte owner address filter
}

message GetProjectActivityRequest {
  bytes project_id = 1;     // 32 bytes
  uint32 limit = 2;          // Max messages (default 50)
  repeated MessageType types = 3;  // Filter by type (empty = all)
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message GetProjectActivityResponse {
  repeated MessageEntry messages = 1;
}

message ListProjectsRequest {
  reserved 1;               // was owner_mid
  uint32 limit = 2;
  bytes cursor = 3;         // Opaque pagination cursor
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
  bytes owner_address = 5;  // 20-byte owner address filter
}

message ListProjectsResponse {
  repeated GetProjectResponse projects = 1;
  bytes next_cursor = 2;
}

// --- Refs ---

message GetRefRequest {
  bytes project_id = 1;
  bytes ref_name = 2;
  uint64 caller_mid = 3 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message GetRefResponse {
  bytes project_id = 1;
  bytes ref_name = 2;
  RefType ref_type = 3;
  bytes hash = 4;           // Current commit hash
  uint64 nonce = 5;
}

message ListRefsRequest {
  bytes project_id = 1;
  uint32 limit = 2;
  bytes cursor = 3;
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message ListRefsResponse {
  repeated GetRefResponse refs = 1;
  bytes next_cursor = 2;
}

// --- Commits ---

message GetCommitRequest {
  bytes project_id = 1;
  bytes commit_hash = 2;    // 32 bytes
  uint64 caller_mid = 3 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message GetCommitResponse {
  bytes project_id = 1;
  CommitMeta commit = 2;
  bytes content_digest = 3;  // Optional: integrity proof from the commit bundle
  string url = 4;            // Optional: content locator URL from the commit bundle
}

message ListCommitsRequest {
  bytes project_id = 1;
  uint32 limit = 2;
  bytes cursor = 3;
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message ListCommitsResponse {
  repeated GetCommitResponse commits = 1;
  bytes next_cursor = 2;
}

// --- Collaborators ---

message ListCollaboratorsRequest {
  bytes project_id = 1;
  uint32 limit = 2;
  bytes cursor = 3;
  uint64 caller_mid = 4 [deprecated = true]; // DEPRECATED: was unauthenticated visibility check, now ignored
}

message CollaboratorEntry {
  reserved 1;               // was mid
  Permission permission = 2;
  bytes owner_address = 3;  // 20-byte owner address
}

message ListCollaboratorsResponse {
